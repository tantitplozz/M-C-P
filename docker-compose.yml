# GOD-TIER AUTOBUY STACK - Production Docker Compose
version: '3.8'

services:
  # Main Application
  autobuy-stack:
    build: .
    container_name: god-tier-autobuy-stack
    restart: unless-stopped
    depends_on:
      - redis
      - prometheus
      - grafana
    ports:
      - "8080:8080"   # API
      - "5900:5900"   # VNC
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PROMETHEUS_HOST=prometheus
      - PROMETHEUS_PORT=9090
      - GRAFANA_HOST=grafana
      - GRAFANA_PORT=3000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - /dev/shm:/dev/shm
    networks:
      - autobuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Memory Store
  redis:
    image: redis:7-alpine
    container_name: autobuy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - autobuy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: autobuy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - autobuy-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: autobuy-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=godtier2024
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana:/etc/grafana/provisioning
    networks:
      - autobuy-network

  # Load Balancer (Production)
  nginx:
    image: nginx:alpine
    container_name: autobuy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - autobuy-stack
    networks:
      - autobuy-network

  # Worker Nodes (Scalable)
  worker-1:
    build: .
    container_name: autobuy-worker-1
    restart: unless-stopped
    depends_on:
      - redis
      - autobuy-stack
    environment:
      - REDIS_HOST=redis
      - WORKER_MODE=true
      - WORKER_ID=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/shm:/dev/shm
    networks:
      - autobuy-network

  worker-2:
    build: .
    container_name: autobuy-worker-2
    restart: unless-stopped
    depends_on:
      - redis
      - autobuy-stack
    environment:
      - REDIS_HOST=redis
      - WORKER_MODE=true
      - WORKER_ID=2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/shm:/dev/shm
    networks:
      - autobuy-network

  # Database Backup Service
  db-backup:
    image: alpine:latest
    container_name: autobuy-backup
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - ./backup:/backup
    command: |
      sh -c "
        while true; do
          echo 'Creating backup...'
          tar -czf /backup/backup-$(date +%Y%m%d_%H%M%S).tar.gz /app/data
          find /backup -name '*.tar.gz' -mtime +7 -delete
          sleep 3600
        done
      "
    networks:
      - autobuy-network

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  autobuy-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
