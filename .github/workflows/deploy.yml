# GOD-TIER AUTOBUY STACK - CI/CD Pipeline
name: Deploy GOD-TIER AUTOBUY STACK

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: god-tier-autobuy-stack

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  security-scan:
    runs-on: ubuntu-latest
    needs: test

        steps:
    - uses: actions/checkout@v4

    - name: Run security scan
      run: |
        pip install bandit
        bandit -r src/ -f json -o security-scan.json || true
        echo "Security scan completed"

      - name: Run dependency check
        run: |
          python -m pip install --upgrade pip
          pip install safety
          safety check -r requirements.txt

  build:
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here

          # Example: Deploy to Docker Swarm
          docker stack deploy -c docker-compose.yml autobuy-stack-staging

          # Example: Deploy to Kubernetes
          # kubectl apply -f k8s/staging/

          # Wait for deployment
          sleep 30

          # Health check
          curl -f http://staging.autobuy-stack.local/health || exit 1

          echo "Staging deployment completed successfully"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/production'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."

          # Production deployment with zero downtime
          docker stack deploy -c docker-compose.prod.yml autobuy-stack-production

          # Health check
          for i in {1..10}; do
            if curl -f http://production.autobuy-stack.local/health; then
              echo "Production deployment successful"
              break
            else
              echo "Waiting for production deployment... ($i/10)"
              sleep 30
            fi
          done

          # Send notification
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-type: application/json' \
            --data '{"text":"🚀 GOD-TIER AUTOBUY STACK deployed to production successfully!"}'

  performance-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Run performance tests
        run: |
          pip install locust

          # Start performance test
          locust -f tests/performance/locustfile.py \
            --host http://staging.autobuy-stack.local \
            --users 100 \
            --spawn-rate 10 \
            --run-time 5m \
            --headless \
            --csv performance_results

          # Check results
          python tests/performance/check_results.py performance_results_stats.csv

  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy-production, performance-test]
    if: always()

    steps:
      - name: Cleanup old images
        run: |
          # Keep only last 5 images
          docker image prune -f

          # Clean up old containers
          docker container prune -f

          # Clean up old networks
          docker network prune -f

          echo "Cleanup completed"
